name: Build Gallery

on:
  workflow_dispatch:

  schedule:
    - cron: '*/30 * * * *'  # 改为30分钟，避免被限流

concurrency:
  group: gallery-process
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick unzip uuid-runtime

      - name: 创建目录
        run: |
          mkdir -p incoming
          mkdir -p photos
          mkdir -p thumbs
          mkdir -p page

      # =========================================
      # 解压 ZIP
      # =========================================
      - name: 解压 ZIP 文件
        run: |
          set -e
          shopt -s nullglob

          mapfile -t zipfiles < <(
            find incoming -type f -iname "*.zip"
          )

          echo "找到 ${#zipfiles[@]} 个 ZIP 文件"

          for zipfile in "${zipfiles[@]}"; do

            [ -f "$zipfile" ] || continue

            echo "解压 ZIP: $zipfile"

            extract_dir=$(mktemp -d)

            unzip -oq "$zipfile" -d "$extract_dir"

            mapfile -t extracted_files < <(
              find "$extract_dir" -type f
            )

            echo "ZIP 中包含 ${#extracted_files[@]} 个文件"

            for extracted in "${extracted_files[@]}"; do

              ext="${extracted##*.}"

              if echo "$ext" | grep -qiE '^(jpg|jpeg|png|webp)$'; then

                ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

                # 保存原始文件名
                original_filename=$(basename "$extracted")
                
                # 使用 UUID 作为临时文件名
                tmpname="$(uuidgen).$ext"
                
                # 将原始文件名编码到临时文件名中
                # 使用分隔符 '==boundary==' 避免冲突
                encoded_name="${original_filename}==boundary==${tmpname}"
                
                mv "$extracted" "incoming/$encoded_name"

                echo "提取文件: $original_filename → $encoded_name"

              fi

            done

            rm -rf "$extract_dir"

            rm -f "$zipfile"

            echo "删除 ZIP: $zipfile"

          done

      # =========================================
      # 调试：列出所有待处理文件
      # =========================================
      - name: 调试 - 列出待处理文件
        run: |
          echo "=== incoming 目录中的所有文件 ==="
          find incoming -type f -ls || echo "无文件"
          echo "================================"

      # =========================================
      # 处理图片
      # =========================================
      - name: 归档照片并更新 JSON
        run: |
          set -e
          shopt -s nullglob

          # 获取所有待处理的图片
          mapfile -t images < <(
            find incoming -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.webp" \
            \)
          )

          echo "找到 ${#images[@]} 个待处理图片"

          # 先构建已有图片的哈希列表，提高效率
          declare -A existing_hashes
          if [ -d "photos" ]; then
            while IFS= read -r existing; do
              if [ -f "$existing" ]; then
                existing_hash=$(basename "$existing" | cut -d. -f1)
                existing_hashes["$existing_hash"]=1
              fi
            done < <(find photos -type f -name "*.*" 2>/dev/null || true)
          fi
          
          echo "已有 ${#existing_hashes[@]} 个图片"

          processed_count=0
          duplicate_count=0
          error_count=0

          for img in "${images[@]}"; do

            [ -f "$img" ] || continue

            echo "处理文件: $img"

            # 计算哈希
            sha256=$(sha256sum "$img" | cut -d' ' -f1)
            echo "SHA256: $sha256"

            ext="${img##*.}"
            ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            # 改进重复检测
            if [[ -n "${existing_hashes[$sha256]}" ]]; then
              echo "⚠️  重复图片，删除: $img"
              rm -f "$img"
              duplicate_count=$((duplicate_count + 1))
              continue
            fi

            hashname="$sha256.$ext"
            echo "Hash 名称: $hashname"

            # 解析原始文件名（从编码的文件名中提取）
            basename_img=$(basename "$img")
            
            if echo "$basename_img" | grep -q '==boundary=='; then
              original_name=$(echo "$basename_img" | sed 's/==boundary==.*//')
              temp_name=$(echo "$basename_img" | sed 's/.*==boundary==//')
              echo "原始文件名: $original_name"
            else
              original_name="$basename_img"
              echo "原始文件名（未编码）: $original_name"
            fi

            # 获取 EXIF 或文件日期
            exif_date=$(identify -format '%[EXIF:DateTimeOriginal]' "$img" 2>/dev/null || echo "")

            if [ -n "$exif_date" ]; then
              echo "使用 EXIF 日期: $exif_date"
              year=$(echo "$exif_date" | cut -d: -f1)
              full_date=$(echo "$exif_date" | cut -d' ' -f1 | tr ':' '-')
            else
              echo "未找到 EXIF 日期，尝试从文件名解析"
              # 从文件名解析日期的逻辑
              if echo "$original_name" | grep -qE '^[0-9]{8}'; then
                # 处理 20240101_image.jpg 格式
                date_part=$(echo "$original_name" | grep -oE '^[0-9]{8}')
                year=$(echo "$date_part" | cut -c1-4)
                full_date=$(echo "$date_part" | sed 's/\(....\)\(..\)\(..\)/\1-\2-\3/')
                echo "从文件名解析日期: $full_date"
              elif echo "$original_name" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
                # 处理 2024-01-01_image.jpg 格式
                date_part=$(echo "$original_name" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
                year=$(echo "$date_part" | cut -d- -f1)
                full_date="$date_part"
                echo "从文件名解析日期: $full_date"
              else
                # 使用文件修改时间
                year=$(date -r "$img" +%Y)
                full_date=$(date -r "$img" +%Y-%m-%d)
                echo "使用文件修改时间: $full_date"
              fi
            fi

            target_dir="photos/$year"
            mkdir -p "$target_dir"

            # 移动文件到目标位置
            mv "$img" "$target_dir/$hashname"
            echo "✓ 移动文件到: $target_dir/$hashname"

            # 设置环境变量供 Python 脚本使用
            export ORIGINAL_NAME="$original_name"
            export HASH_NAME="$hashname"
            export YEAR="$year"
            export FULL_DATE="$full_date"
            export SHA256="$sha256"

            # 执行 Python 脚本构建条目
            if [ -f "scripts/build_entry.py" ]; then
              python3 scripts/build_entry.py
              echo "✓ 执行 build_entry.py"
            else
              echo "⚠️  警告: scripts/build_entry.py 不存在"
            fi

            echo "✅ 归档完成: $original_name → $year/$hashname"
            
            # 记录已处理的哈希
            existing_hashes["$sha256"]=1
            processed_count=$((processed_count + 1))

          done

          # 清理空的 incoming 目录
          find incoming -type d -empty -delete 2>/dev/null || true

          # 输出统计信息
          echo "========================================"
          echo "处理统计:"
          echo "  成功处理: $processed_count 个文件"
          echo "  重复跳过: $duplicate_count 个文件"
          echo "  处理错误: $error_count 个文件"
          echo "========================================"

      # =========================================
      # 生成缩略图
      # =========================================
      - name: 生成缩略图
        run: |
          set -e
          
          mapfile -t photo_files < <(
            find photos -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.webp" \
            \)
          )

          echo "找到 ${#photo_files[@]} 个需要生成缩略图的图片"

          generated_count=0
          skipped_count=0

          for img in "${photo_files[@]}"; do

            relative_path="${img#photos/}"

            thumb_path="thumbs/$relative_path"

            thumb_dir=$(dirname "$thumb_path")

            mkdir -p "$thumb_dir"

            if [ ! -f "$thumb_path" ]; then

              if convert "$img" -resize 400x -quality 80 "$thumb_path"; then
                echo "✓ 生成缩略图: $relative_path"
                generated_count=$((generated_count + 1))
              else
                echo "❌ 生成缩略图失败: $relative_path"
              fi

            else
              skipped_count=$((skipped_count + 1))
            fi

          done

          echo "缩略图统计: 生成 $generated_count, 跳过 $skipped_count"

      # =========================================
      # 清理孤儿缩略图
      # =========================================
      - name: 清理多余缩略图
        run: |
          set -e
          
          mapfile -t thumbs_files < <(
            find thumbs -type f 2>/dev/null || true
          )

          echo "找到 ${#thumbs_files[@]} 个缩略图"

          removed_count=0

          for thumb in "${thumbs_files[@]}"; do

            original="photos/${thumb#thumbs/}"

            if [ ! -f "$original" ]; then
              rm -f "$thumb"
              echo "删除孤儿缩略图: $thumb"
              removed_count=$((removed_count + 1))
            fi

          done

          # 删除空目录
          find thumbs -type d -empty -delete 2>/dev/null || true

          echo "清理了 $removed_count 个孤儿缩略图"

      # =========================================
      # 提交
      # =========================================
      - name: 提交更改
        run: |
          set -e
          
          # 检查是否有更改
          if git diff --cached --quiet && git diff --quiet; then
            echo "没有需要提交的更改"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # 显示将要提交的文件
          echo "将要提交的文件:"
          git diff --cached --name-only

          git commit -m "更新相册 [skip ci]"

          # 尝试推送，如果失败则先拉取
          if ! git push origin HEAD:main 2>/dev/null; then
            echo "推送失败，尝试先拉取..."
            git fetch origin main
            
            if ! git rebase origin/main; then
              echo "Rebase 冲突，等待下次定时任务"
              git rebase --abort
              exit 0
            fi
            
            git push origin HEAD:main
          fi

          echo "✅ 成功提交并推送更改"