name: Build Gallery

on:
  workflow_dispatch:
  schedule:
    # 每 10 分钟运行一次（建议不要太频繁，给 Git 操作留出缓冲时间）
    - cron: '*/10 * * * *'

concurrency:
  group: gallery-process
  # 关键修复：设为 false，确保正在处理的文件能完成 commit/push，不被新任务中断
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 如果你有多个 workflow 互相触发的需求，这里可以换成 PAT
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick unzip uuid-runtime

      - name: 创建目录
        run: mkdir -p incoming photos thumbs page

      # =========================================
      # 1. 解压 ZIP 并重命名（保留原始名信息）
      # =========================================
      - name: 解压 ZIP 文件
        run: |
          shopt -s nullglob
          find incoming -type f -iname "*.zip" | while read -r zipfile; do
            echo "正在处理压缩包: $zipfile"
            extract_dir=$(mktemp -d)
            unzip -oq "$zipfile" -d "$extract_dir"

            # 遍历解压出的所有文件
            find "$extract_dir" -type f | while read -r extracted; do
              ext="${extracted##*.}"
              # 仅处理图片格式
              if echo "$ext" | grep -qiE '^(jpg|jpeg|png|webp)$'; then
                base_name=$(basename "$extracted")
                clean_ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
                
                # 使用 时间戳_原始文件名 存放到 incoming，避免重名冲突且保留原名
                new_temp_name="$(date +%s%N)_$base_name"
                mv "$extracted" "incoming/$new_temp_name"
                echo "提取并暂存: $new_temp_name"
              fi
            done
            rm -rf "$extract_dir"
            rm -f "$zipfile"
          done

      # =========================================
      # 2. 归档照片并生成数据
      # =========================================
      - name: 归档照片并更新 JSON
        run: |
          shopt -s nullglob
          # 获取所有暂存图片
          mapfile -t images < <(find incoming -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" \))
          
          if [ ${#images[@]} -eq 0 ]; then
            echo "没有新图片需要处理"
            exit 0
          fi

          for img in "${images[@]}"; do
            [ -f "$img" ] || continue
            
            # 计算 Hash 作为永久文件名
            sha256=$(sha256sum "$img" | cut -d' ' -f1)
            ext="${img##*.}"
            clean_ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            hashname="$sha256.$clean_ext"

            # 重复检查
            if find photos -type f -name "$hashname" | grep -q "$hashname"; then
              echo "检测到重复图片，跳过: $img"
              rm -f "$img"
              continue
            fi

            # 还原原始文件名（去掉之前加的时间戳前缀）
            temp_basename=$(basename "$img")
            original_name=$(echo "$temp_basename" | sed 's/^[0-9]*_//')

            # 提取日期逻辑
            exif_date=$(identify -format '%[EXIF:DateTimeOriginal]' "$img" 2>/dev/null || echo "")
            
            if [ -n "$exif_date" ]; then
                year=$(echo "$exif_date" | cut -d: -f1)
                full_date=$(echo "$exif_date" | cut -d' ' -f1 | tr ':' '-')
            else
                # 如果没有 EXIF，尝试从文件名解析或使用文件修改时间
                year=$(date -r "$img" +%Y)
                full_date=$(date -r "$img" +%Y-%m-%d)
            fi

            # 移动到正式目录
            target_dir="photos/$year"
            mkdir -p "$target_dir"
            mv "$img" "$target_dir/$hashname"

            # 传递变量给 Python 脚本处理 JSON
            export ORIGINAL_NAME="$original_name"
            export HASH_NAME="$hashname"
            export YEAR="$year"
            export FULL_DATE="$full_date"
            export SHA256="$sha256"

            python3 scripts/build_entry.py
            echo "归档完成: $original_name -> $target_dir/$hashname"
          done

      # =========================================
      # 3. 缩略图处理
      # =========================================
      - name: 生成缩略图
        run: |
          shopt -s nullglob
          # 仅为没有缩略图的照片生成
          find photos -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" \) | while read -r img; do
            rel_path="${img#photos/}"
            thumb_path="thumbs/$rel_path"
            
            if [ ! -f "$thumb_path" ]; then
              mkdir -p "$(dirname "$thumb_path")"
              convert "$img" -resize 400x -quality 80 "$thumb_path"
              echo "生成缩略图: $thumb_path"
            fi
          done

      - name: 清理孤儿缩略图
        run: |
          find thumbs -type f | while read -r thumb; do
            original="photos/${thumb#thumbs/}"
            if [ ! -f "$original" ]; then
              rm -f "$thumb"
              echo "清理冗余缩略图: $thumb"
            fi
          done
          find thumbs -type d -empty -delete 2>/dev/null || true

      # =========================================
      # 4. 提交更改
      # =========================================
      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          # 检查是否有内容变更
          if git diff --cached --quiet; then
            echo "没有内容变更，跳过提交"
            exit 0
          fi
          
          git commit -m "自动更新相册数据 [skip ci]"
          
          # 使用 rebase 模式推送，增加在并发环境下的稳定性
          git pull --rebase origin main
          git push origin main
